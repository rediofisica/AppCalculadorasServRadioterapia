<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Servicio de Oncología Radioterápica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* Clase para vistas inactivas */
        .view-hidden {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800 selection:bg-blue-200">

    <main class="min-h-screen flex flex-col items-center justify-center p-4">
        
        <!-- Contenedor Principal de la App -->
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 sm:p-8 border border-gray-100 relative min-h-[500px] flex flex-col">
            
            <!-- ========================================== -->
            <!-- VISTA 1: MENÚ PRINCIPAL (INICIO)           -->
            <!-- ========================================== -->
            <section id="view-home" class="app-view flex-1 flex flex-col justify-center">
                <div class="text-center mb-10">
                    <!-- Imagen del Logo -->
                    <!-- Se ha añadido un onerror por si la imagen no existe aún en la carpeta, muestre un recuadro de texto -->
                    <img src="assets/SacylLogo.svg" alt="Logo Sacyl" class="h-24 mx-auto mb-6 object-contain"
                         onerror="this.style.display='none'; document.getElementById('logo-fallback').classList.remove('hidden');">
                    
                    <!-- Fallback en caso de que no se encuentre el logo -->
                    <div id="logo-fallback" class="hidden w-24 h-24 bg-blue-50 text-blue-700 rounded-full flex items-center justify-center mx-auto mb-6 font-bold text-xl border-4 border-blue-100">
                        SACYL
                    </div>

                    <h1 class="text-2xl font-bold text-gray-900 leading-tight">
                        Servicio de Oncología Radioterápica
                    </h1>
                    <p class="text-sm text-gray-500 mt-2 font-medium">Complejo Asistencial de Zamora</p>
                </div>

                <div class="space-y-4 w-full px-2">
                    <button onclick="navigateTo('view-construction')" class="w-full flex items-center justify-between bg-white border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-700 font-semibold py-4 px-6 rounded-2xl transition-all active:scale-95">
                        <span class="flex items-center gap-3">
                            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Documentación
                        </span>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>

                    <button onclick="navigateTo('view-calculators')" class="w-full flex items-center justify-between bg-white border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-700 font-semibold py-4 px-6 rounded-2xl transition-all active:scale-95">
                        <span class="flex items-center gap-3">
                            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            Calculadoras
                        </span>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </section>

            <!-- ========================================== -->
            <!-- VISTA 2: EN CONSTRUCCIÓN                   -->
            <!-- ========================================== -->
            <section id="view-construction" class="app-view view-hidden flex-1 flex flex-col justify-between">
                <div class="flex-1 flex flex-col items-center justify-center text-center">
                    <div class="bg-orange-100 text-orange-500 p-4 rounded-full mb-4">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">En construcción</h2>
                    <p class="text-gray-500 mt-2">Esta sección estará disponible próximamente.</p>
                </div>
                <button onclick="navigateTo('view-home')" class="mt-8 w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-4 rounded-xl transition-all">
                    Volver al Inicio
                </button>
            </section>

            <!-- ========================================== -->
            <!-- VISTA 3: MENÚ DE CALCULADORAS              -->
            <!-- ========================================== -->
            <section id="view-calculators" class="app-view view-hidden flex-1 flex flex-col">
                <div class="mb-6 flex items-center gap-3">
                    <button onclick="navigateTo('view-home')" class="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <h2 class="text-xl font-bold text-gray-800">Calculadoras</h2>
                </div>

                <div class="space-y-3 flex-1 overflow-y-auto">
                    <!-- Botón a Calculadora Vejiga -->
                    <button onclick="navigateTo('view-bladder-calc')" class="w-full text-left bg-blue-50 hover:bg-blue-100 border border-blue-100 text-blue-900 font-medium py-4 px-5 rounded-xl transition-all flex items-center justify-between">
                        Calculadora volumen vejiga
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                    
                    <!-- Aquí se pueden añadir más botones en el futuro -->
                </div>
            </section>

            <!-- ========================================== -->
            <!-- VISTA 4: CALCULADORA VOLUMEN VEJIGA        -->
            <!-- ========================================== -->
            <section id="view-bladder-calc" class="app-view view-hidden flex-1 flex flex-col">
                <div class="mb-6 flex items-center gap-3">
                    <button onclick="navigateTo('view-calculators')" class="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <h2 class="text-lg font-bold text-gray-800 leading-tight">Volumen Vejiga</h2>
                </div>

                <form id="bladderForm" class="space-y-4 flex-1">
                    <!-- Eje X -->
                    <div>
                        <label for="ejeX" class="block text-sm font-medium text-gray-700 mb-1">Eje X (cm)</label>
                        <input type="number" id="ejeX" required step="any" placeholder="Ej: 5.2"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-lg bg-gray-50">
                    </div>

                    <!-- Eje Y -->
                    <div>
                        <label for="ejeY" class="block text-sm font-medium text-gray-700 mb-1">Eje Y (cm)</label>
                        <input type="number" id="ejeY" required step="any" placeholder="Ej: 4.8"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-lg bg-gray-50">
                    </div>

                    <!-- Eje Z -->
                    <div>
                        <label for="ejeZ" class="block text-sm font-medium text-gray-700 mb-1">Eje Z (cm)</label>
                        <input type="number" id="ejeZ" required step="any" placeholder="Ej: 6.1"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-lg bg-gray-50">
                    </div>

                    <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95 text-lg mt-4">
                        Calcular resultado
                    </button>
                </form>

                <!-- Contenedor del Resultado Vejiga -->
                <div id="bladderResultContainer" class="mt-6 p-4 bg-blue-50 rounded-2xl border border-blue-100 hidden">
                    <p class="text-xs font-semibold text-blue-600 uppercase tracking-wider text-center">Volumen Calculado</p>
                    <p class="text-3xl font-extrabold text-blue-700 text-center mt-1">
                        <span id="bladderResult">0.00</span> <span class="text-xl font-semibold text-blue-500">cm³</span>
                    </p>
                </div>
            </section>

        </div>
    </main>

    <script>
        /**
         * Función para cambiar entre pantallas (vistas)
         */
        function navigateTo(viewId) {
            // Ocultar todas las vistas
            const views = document.querySelectorAll('.app-view');
            views.forEach(view => {
                view.classList.add('view-hidden');
            });
            
            // Mostrar la vista solicitada
            const viewToShow = document.getElementById(viewId);
            if(viewToShow) {
                viewToShow.classList.remove('view-hidden');
            }
            
            // Si salimos de la calculadora, ocultar el resultado para la próxima vez
            if(viewId !== 'view-bladder-calc') {
                document.getElementById('bladderResultContainer').classList.add('hidden');
                document.getElementById('bladderForm').reset();
            }
        }

        /**
         * Lógica de la Calculadora de Vejiga
         */
        const bladderForm = document.getElementById('bladderForm');
        
        bladderForm.addEventListener('submit', function(event) {
            event.preventDefault();

            // Obtener valores
            const x = parseFloat(document.getElementById('ejeX').value);
            const y = parseFloat(document.getElementById('ejeY').value);
            const z = parseFloat(document.getElementById('ejeZ').value);

            // FÓRMULA: 1/6 * PI * X * Y * Z
            const volumen = (1 / 6) * Math.PI * x * y * z;

            // Mostrar resultado formateado a 2 decimales
            document.getElementById('bladderResult').innerText = volumen.toLocaleString('es-ES', { maximumFractionDigits: 2 });
            document.getElementById('bladderResultContainer').classList.remove('hidden');
        });
    </script>
</body>
</html>
